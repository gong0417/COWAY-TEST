# RV-SYSTEM — Synology NAS / Docker (프로덕션 지향)
#
# 사용법:
#   cp docker-compose.env.example .env
#   # .env에서 POSTGRES_PASSWORD 등 필수 값 설정
#   docker compose up --build -d
#
# 접속 (호스트):
#   웹 UI: http://<NAS-IP>:${FRONTEND_PORT:-8080}
#   API는 동일 출처로 /api/* (Nginx → backend:3000). 브라우저는 8080만 사용하면 됨.
#
# 보안:
#   PostgreSQL은 기본적으로 호스트에 포트를 노출하지 않습니다(컨테이너 간 통신만).
#   호스트에서 psql 등이 필요하면 postgres.services.ports 주석을 해제하세요.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rvsystem}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-reliability}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    # 프로덕션: DB를 외부에 열지 않음. 로컬 도구만 쓸 때만 아래 주석 해제 권장:
    # ports:
    #   - "127.0.0.1:5432:5432"
    expose:
      - "5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - rvsystem
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATA_DIR: /data
      # URL 인코딩 이슈를 피하려면 DATABASE_URL 대신 PG* 사용 (pool.js)
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: ${POSTGRES_USER:-rvsystem}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB:-reliability}
      # 비어 있으면 CORS는 요청 Origin 반영(동일 출처 + Nginx 프록시와 호환)
      CORS_ORIGIN: ${CORS_ORIGIN:-}
    volumes:
      - ./data:/data
    expose:
      - "3000"
    # 직접 API 디버그가 필요할 때만:
    # ports:
    #   - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 25s
    networks:
      - rvsystem
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      args:
        # 빌드 시 비우면 런타임에 동일 출처(/api) 사용 — Nginx 프록시와 일치
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:8080"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - rvsystem
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  rvsystem:
    driver: bridge

volumes:
  pgdata:
